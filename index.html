<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Soulmate Matcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            --roast-grad: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-color: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: #eef1f5;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 107, 107, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(78, 205, 196, 0.15) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* 메인 카드 디자인 */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
        }

        h1 { 
            color: #1a1a1a; 
            margin-bottom: 8px; 
            font-size: 28px; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .sub-text { 
            color: #64748b; 
            font-size: 15px; 
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* 입력창 디자인 */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            margin-left: 5px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: #ff8e8e;
            transform: translateY(-2px);
        }

        input {
            width: 100%;
            padding: 10px;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            font-family: inherit;
            color: #1e293b;
            box-sizing: border-box;
        }

        input::placeholder { color: #cbd5e1; }

        /* 버튼 디자인 */
        button {
            width: 100%;
            padding: 18px;
            background: var(--primary-grad);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        button:hover { 
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.4);
        }

        button:active { transform: scale(0.98); }

        /* 로딩 애니메이션 */
        #loading { 
            display: none; 
            margin: 20px 0; 
            color: #ff6b6b; 
            font-size: 14px;
            font-weight: 600;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,107,107,0.2);
            border-top: 3px solid #ff6b6b;
            border-radius: 50%;
            margin: 0 auto 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 결과 영역 디자인 */
        #result-section {
            display: none;
            animation: slideUp 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .score-container {
            position: relative;
            display: inline-block;
            margin: 20px 0;
        }

        .score-badge {
            font-size: 72px;
            font-weight: 900;
            background: var(--roast-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .score-unit {
            font-size: 20px;
            color: #f5576c;
            margin-left: 5px;
        }

        .description {
            line-height: 1.7;
            color: #334155;
            background: white;
            padding: 25px;
            border-radius: 25px;
            margin: 20px 0;
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            word-break: keep-all;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-retry {
            background: #f1f5f9;
            color: #64748b;
            box-shadow: none;
            margin-top: 10px;
        }
        .btn-retry:hover { background: #e2e8f0; color: #475569; box-shadow: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="input-section">
        <h1>💕 Soulmate Matcher</h1>
        <p class="sub-text">우리의 운명적인 궁합을 분석해볼까요?</p>

        <div class="input-group">
            <label>You</label>
            <div class="input-box">
                <input type="text" id="nick1" placeholder="닉네임 입력">
                <input type="text" id="like1" placeholder="좋아하는 것 (예: 코딩, 여행)">
            </div>
        </div>

        <div class="input-group">
            <label>Partner</label>
            <div class="input-box">
                <input type="text" id="nick2" placeholder="상대방 닉네임">
                <input type="text" id="like2" placeholder="상대방 취향">
            </div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <span>GPT가 우주의 기운을 모으는 중...</span>
        </div>

        <button id="submit-btn" onclick="startAnalysis()">운명 확인하기</button>
    </div>

    <div id="result-section">
        <p style="font-weight: 800; color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">Matching Score</p>
        <div class="score-container">
            <span class="score-badge" id="res-score">0</span><span class="score-unit">점</span>
        </div>
        <div class="description" id="res-desc"></div>
        <button class="btn-retry" onclick="location.reload()">다시 분석하기</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIhFW43_opX-n2XAROMG3Mg3xFDNs6NoOTeDlmCAfy02aXYrIOH_ACpH9lEXOCIBoM/exec";

    async function startAnalysis() {
        const nick1 = document.getElementById('nick1').value;
        const like1 = document.getElementById('like1').value;
        const nick2 = document.getElementById('nick2').value;
        const like2 = document.getElementById('like2').value;
        const btn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');

        if (!nick1 || !like1 || !nick2 || !like2) {
            alert("모든 빈칸을 채워주셔야 운명을 읽을 수 있어요!");
            return;
        }

        btn.style.display = 'none';
        loading.style.display = 'block';

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ nick1, like1, nick2, like2 })
            });

            const result = await response.json();

            document.getElementById('input-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            document.getElementById('res-score').innerText = result.score;
            document.getElementById('res-desc').innerText = `"${result.description}"`;

        } catch (error) {
            console.error("Error:", error);
            alert("연결에 실패했습니다. API 키나 배포 상태를 확인해주세요.");
            btn.style.display = 'block';
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
