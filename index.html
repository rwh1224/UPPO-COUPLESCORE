<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최고의 궁합 찾기</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff6b6b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #loading { display: none; color: #ff6b6b; margin: 10px 0; font-size: 14px; }
        /* 결과창 디자인 */
        #result-section { display: none; margin-top: 20px; padding: 20px; border-top: 2px dashed #ff6b6b; }
        .score { font-size: 40px; color: #ff6b6b; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>💕 궁합 탐지기</h2>
    <p>당신과 최고의 궁합을 가진 사람을 찾아보세요!</p>
    
    <div id="input-section">
        <input type="text" id="nick1" placeholder="내 닉네임">
        <input type="text" id="like1" placeholder="내가 좋아하는 것">
        <hr>
        <input type="text" id="nick2" placeholder="상대 닉네임">
        <input type="text" id="like2" placeholder="상대가 좋아하는 것">
        <div id="loading">제미나이가 분석 중...</div>
        <button onclick="check()">분석 시작!</button>
    </div>

    <div id="result-section">
        <div class="score"><span id="res-score">0</span>점</div>
        <p id="res-desc"></p>
        <button onclick="location.reload()" style="background:#666">다시 하기</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLE8WivgI4lp1hrf_30lOEFbtiiOSL6XxLdgqpjiF67Io6PmRn7HWW4MKYLdFgdltL/exec";

    async function check() {
        const data = {
            nick1: document.getElementById('nick1').value,
            like1: document.getElementById('like1').value,
            nick2: document.getElementById('nick2').value,
            like2: document.getElementById('like2').value
        };

        document.getElementById('loading').style.display = 'block';

        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            const result = await res.json();

            document.getElementById('input-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block'; // 결과창 보여주기
            document.getElementById('res-score').innerText = result.score;
            document.getElementById('res-desc').innerText = result.description;
        } catch (e) {
            alert("연결 오류! 구글 앱스 스크립트 배포 설정을 확인하세요.");
        }
    }
</script>
</body>
</html>
